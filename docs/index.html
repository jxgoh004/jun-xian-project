<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #58a6ff;
      --text: #c9d1d9;
      --text-bright: #f0f6fc;
      --text-dim: #8b949e;
      --radius: 8px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header img { width: 34px; height: 34px; border-radius: 8px; }
    header h1 { font-size: 17px; font-weight: 600; color: var(--text-bright); }
    main {
      max-width: 900px;
      margin: 60px auto;
      padding: 0 24px;
      text-align: center;
    }
    main h2 { font-size: 28px; color: var(--text-bright); margin-bottom: 12px; }
    main p { color: var(--text-dim); margin-bottom: 40px; }
    .projects { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: left;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--accent); }
    .card h3 { color: var(--text-bright); margin-bottom: 8px; }
    .card p { color: var(--text-dim); font-size: 14px; margin-bottom: 12px; }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 12px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <header>
    <img src="projects/calculator/img/logo_2.png" alt="Logo">
    <h1>Portfolio</h1>
  </header>
  <main>
    <h2>Projects</h2>
    <p>Click a card to try the project.</p>
    <div class="projects">
      <a class="card" href="projects/calculator/index.html">
        <h3>Intrinsic Value Calculator</h3>
        <p>Fetch live stock data and calculate intrinsic value using DCF analysis with 20-year projections.</p>
        <div class="tags">
          <span class="tag">Python</span>
          <span class="tag">Flask</span>
          <span class="tag">JavaScript</span>
          <span class="tag">Finance</span>
        </div>
      </a>
    </div>
  </main>
</body>
</html>
