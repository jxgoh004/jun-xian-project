name: Nightly Pattern Scanner Data

on:
  schedule:
    - cron: '0 7 * * 1-5'  # 07:00 UTC weekdays — 1h after the DCF screener (06:00 UTC)
  workflow_dispatch:         # manual trigger for testing

permissions:
  contents: write            # required for git push with GITHUB_TOKEN

# BL-04: prevent a `workflow_dispatch` manual run from racing the 07:00 UTC cron.
# Serialise on a named group; `cancel-in-progress: false` ensures the in-flight
# run completes (so its commit is preserved) before the next one starts.
concurrency:
  group: nightly-pattern-scanner
  cancel-in-progress: false

jobs:
  pattern-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # BL-04: full history required so `git pull --rebase` can resolve
          # against the latest remote main without shallow-clone surprises.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run nightly pattern scanner
        run: python -m scripts.pattern_scanner.run_pipeline --tickers all --window-days 20 --out-dir docs/projects/patterns

      # ME-03: Surface pipeline_status.completed=False as a workflow failure.
      # run_pipeline.py always exits 0 (errors are logged into data.json, not
      # raised), so without this gate a sub-95% night still commits and pushes
      # silently. With this gate the workflow itself fails, GitHub emails the
      # repo owner, and the bad data is still committed (next step runs after
      # the verification result — we still want the partial data on disk for
      # forensic analysis).
      - name: Verify pipeline completed
        id: verify_pipeline
        continue-on-error: true
        run: |
          python -c "
          import json, sys
          data = json.load(open('docs/projects/patterns/data.json'))
          ps = data['pipeline_status']
          if not ps['completed']:
              print(f'::warning::pipeline_status.completed=False: '
                    f\"succeeded={ps['succeeded_count']} failed={ps['failed_count']}\")
              sys.exit(1)
          print(f'pipeline_status.completed=True (succeeded={ps[\"succeeded_count\"]} '
                f'failed={ps[\"failed_count\"]})')
          "

      - name: Commit updated pattern scanner data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/projects/patterns/data.json docs/projects/patterns/stats.json docs/projects/patterns/charts/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          # BL-04: tag the bot commit with [skip ci] so the resulting push
          # does not re-trigger any CI workflow that watches main.
          git commit -m "chore: nightly pattern scanner data update [skip ci]"
          # BL-04: rebase against the latest remote main before pushing.
          # The nightly DCF screener at 06:00 UTC can race this 07:00 UTC
          # workflow if it overruns (~500 tickers); without rebase the push
          # fails non-fast-forward and the night's data is lost.
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            echo "push attempt $i failed; retrying after 5s"
            sleep 5
          done
          exit 1

      # ME-03: re-raise the verify_pipeline failure so the workflow as a whole
      # shows red in GitHub Actions when the pipeline did not complete cleanly.
      # We deliberately run this AFTER the commit step so the failure signal
      # fires only once the partial data has been preserved on disk.
      - name: Fail workflow if pipeline did not complete
        if: steps.verify_pipeline.outcome == 'failure'
        run: |
          echo "::error::Pipeline did not complete cleanly — see Verify pipeline completed step."
          exit 1
